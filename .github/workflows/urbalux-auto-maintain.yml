name: URBALUX AI — Auto-Mantenimiento

on:
  schedule:
    - cron: '0 */6 * * *'   # Cada 6 horas automáticamente
  workflow_dispatch:          # Botón manual en GitHub

jobs:
  mantener:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch@3

      - name: Ejecutar mantenimiento IA
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          WEB_FILE: urbalux.html
        run: node scripts/auto-maintain.js

      - name: Commit cambios si los hay
        run: |
          git config user.name "URBALUX AI Bot"
          git config user.email "bot@urbalux.ai"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 URBALUX Auto-Update: $(cat /tmp/changelog.txt 2>/dev/null || echo 'mejoras automáticas')"
          git push
